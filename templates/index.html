<!DOCTYPE html>
<html>
<head>
    <title>PrePrint Check System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="text-center">PrePrint Check System</h3>
            <form action="/cek" method="POST" enctype="multipart/form-data">
                <input type="file" name="file" class="form-control mt-3" required>
                <button class="btn btn-primary mt-3 w-100">Cek Surat</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
