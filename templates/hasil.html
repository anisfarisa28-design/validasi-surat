<!DOCTYPE html>
<html>
<head>
    <title>Hasil Validasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">

            <h3 class="text-center">Hasil Validasi Surat</h3>

            <!-- STATUS -->
            <div class="alert mt-3 
                {% if 'Layak' in status %}alert-success{% else %}alert-danger{% endif %}">
                <strong>Status:</strong> {{ status }}
            </div>

            <!-- ISI SURAT -->
            <h5>Isi Surat:</h5>
            <pre>{{ isi }}</pre>

            <!-- KESALAHAN -->
            <h5 class="mt-3">Kesalahan Ejaan:</h5>
            {% if salah %}
                <ul>
                    {% for k in salah %}
                        <li>{{ k }}</li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-success">Tidak ada kesalahan 🎉</p>
            {% endif %}

            <a href="/" class="btn btn-secondary mt-3">Kembali</a>

        </div>
    </div>
</div>

</body>
</html>
